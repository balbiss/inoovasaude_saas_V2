version: '3.8'

services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: crm_backend_development
    ports:
      - "5432:5432"

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: bash -c "rm -f tmp/pids/server.pid && bundle install && bundle exec rails db:prepare && bundle exec rails server -b 0.0.0.0"
    volumes:
      - .:/rails
      - bundle_data:/usr/local/bundle
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgres://postgres:password@db:5432/crm_backend_development
      - RAILS_ENV=development
    depends_on:
      - db
      - redis
      - baileys-api
    extra_hosts:
      - "host.docker.internal:host-gateway"

  worker:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: bash -c "bundle install && bundle exec rails jobs:work"
    volumes:
      - .:/rails
      - bundle_data:/usr/local/bundle
    environment:
      - DATABASE_URL=postgres://postgres:password@db:5432/crm_backend_development
      - RAILS_ENV=development
    depends_on:
      - db
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  baileys-api:
    image: ghcr.io/fazer-ai/baileys-api:latest
    ports:
      - "3025:3025"
    volumes:
      - baileys_storage:/app/storage
    environment:
      - NODE_ENV=production
      - PORT=3025
      - REDIS_URL=redis://redis:6379
      - REDIS_PASSWORD=
      - LOG_LEVEL=info
      - BAILEYS_LOG_LEVEL=error
      - BAILEYS_PROVIDER_DEFAULT_API_KEY=innovaweb2025
      - IGNORE_GROUP_MESSAGES=true
      - IGNORE_STATUS_MESSAGES=true
    command:
      - sh
      - "-c"
      - "bun manage-api-keys create user innovaweb2025 && bun start"
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  postgres_data:
  bundle_data:
  baileys_storage:
