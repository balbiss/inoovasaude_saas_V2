version: '3.8'

services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: inoovasaude_development
    ports:
      - "5432:5432"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: bash -c "rm -f tmp/pids/server.pid && bundle install && bundle exec rails db:migrate && bundle exec rails server -b 0.0.0.0"
    volumes:
      - .:/rails
      - bundle_data:/usr/local/bundle
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgres://postgres:password@db:5432/inoovasaude_development
      - RAILS_ENV=development
      - SECRET_KEY_BASE=a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2
      - BAILEYS_API_URL=http://baileys-api:3025
      - REDIS_URL=redis://redis:6379
      - BAILEYS_API_KEY=innovaweb2025
      - API_HOST=http://web:3000
      - PUBLIC_URL=http://localhost:3000
      - DISABLE_SPRING=1
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
  bundle_data:
